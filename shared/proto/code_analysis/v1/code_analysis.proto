syntax = "proto3";

package code_analysis.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sentiae/code-analysis-service/gen/code_analysis/v1;codeanalysisv1";

// CodeAnalysisService is the inter-service seam for Vigil. ops-service
// uses it for quality gates, git-service uses it for per-session
// complexity/security deltas, and foundry-service uses it to request
// ad-hoc scans for agentic flows. The portal still talks to the HTTP
// surface; this RPC is the machine-to-machine contract.
service CodeAnalysisService {
  // GetSecurityBaseline returns the most recent completed scan summary
  // for the given (tenant, target) pair. Used by ops-service as the
  // denominator for delta-based quality gates ("does this deploy
  // introduce more critical findings than baseline?").
  rpc GetSecurityBaseline(GetSecurityBaselineRequest) returns (SecurityBaseline);

  // GetCurrentSecurityScan returns the most recent scan for a target
  // regardless of completion state. Used by the portal dashboards and
  // by ops-service when it needs "what is running now" context.
  rpc GetCurrentSecurityScan(GetCurrentSecurityScanRequest) returns (SecurityScan);

  // GetComplexityDelta returns the cyclomatic-complexity + findings
  // delta between two commit SHAs. Used by git-service to attach a
  // quality signal to each editor session / PR.
  rpc GetComplexityDelta(GetComplexityDeltaRequest) returns (ComplexityDelta);

  // RequestScan triggers an asynchronous scan and returns a handle the
  // caller can poll with GetScanStatus.
  rpc RequestScan(RequestScanRequest) returns (ScanHandle);

  // GetScanStatus returns the lifecycle state + summary of a scan.
  rpc GetScanStatus(GetScanStatusRequest) returns (SecurityScan);

  // ListFindings is a paginated findings feed for a tenant, filterable
  // by severity / status / analysis type.
  rpc ListFindings(ListFindingsRequest) returns (ListFindingsResponse);
}

// ─────────────────────────────────────────────────────────────────
// SecurityBaseline + SecurityScan
// ─────────────────────────────────────────────────────────────────

// SecurityBaseline is the most recent completed scan summary for a
// target. Counts are by severity; scan_id links back to the full row.
message SecurityBaseline {
  string scan_id = 1;
  string tenant_id = 2;
  string target = 3;
  string branch = 4;
  string commit_sha = 5;
  int32 findings_critical = 6;
  int32 findings_high = 7;
  int32 findings_medium = 8;
  int32 findings_low = 9;
  int32 findings_info = 10;
  int32 findings_total = 11;
  google.protobuf.Timestamp completed_at = 12;
}

// SecurityScan is the lifecycle view of one scan job. Mirrors the
// domain.Scan shape.
message SecurityScan {
  string id = 1;
  string tenant_id = 2;
  string scan_type = 3;
  string target = 4;
  string branch = 5;
  string commit_sha = 6;
  string status = 7;     // queued | running | completed | failed
  string priority = 8;
  int32 findings_new = 9;
  int32 findings_total = 10;
  int64 duration_ms = 11;
  string error = 12;
  string triggered_by = 13;
  google.protobuf.Timestamp started_at = 14;
  google.protobuf.Timestamp completed_at = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

message GetSecurityBaselineRequest {
  string tenant_id = 1;
  string target = 2;    // repository URL / container image / etc.
  string branch = 3;    // optional — defaults to any
}

message GetCurrentSecurityScanRequest {
  string tenant_id = 1;
  string target = 2;
  string branch = 3;
}

// ─────────────────────────────────────────────────────────────────
// ComplexityDelta
// ─────────────────────────────────────────────────────────────────

message GetComplexityDeltaRequest {
  string tenant_id = 1;
  string target = 2;
  string from_commit_sha = 3;
  string to_commit_sha = 4;
}

// ComplexityDelta summarises the change in quality between two commits.
// Positive deltas indicate additions; negative indicate removals.
message ComplexityDelta {
  string tenant_id = 1;
  string target = 2;
  string from_commit_sha = 3;
  string to_commit_sha = 4;
  int32 findings_critical_delta = 5;
  int32 findings_high_delta = 6;
  int32 findings_medium_delta = 7;
  int32 findings_low_delta = 8;
  int32 findings_total_delta = 9;
  // Cyclomatic / cognitive complexity deltas are computed per-file and
  // aggregated; until the aggregator is wired, these fields are 0.
  double avg_cyclomatic_delta = 10;
  double avg_cognitive_delta = 11;
}

// ─────────────────────────────────────────────────────────────────
// Scan request lifecycle
// ─────────────────────────────────────────────────────────────────

message RequestScanRequest {
  string tenant_id = 1;
  string scan_type = 2;   // sast | sca | secret_detection | iac | ...
  string target = 3;
  string branch = 4;
  string commit_sha = 5;
  string priority = 6;    // default | critical
  string triggered_by = 7;
  // optional; registry Basic-auth password so the worker can pull a private image target
  string registry_pull_token = 8;
}

// ScanHandle is returned by RequestScan so the caller can poll for
// completion without re-submitting the scan.
message ScanHandle {
  string scan_id = 1;
  string status = 2;
  google.protobuf.Timestamp queued_at = 3;
}

message GetScanStatusRequest {
  string tenant_id = 1;
  string scan_id = 2;
}

// ─────────────────────────────────────────────────────────────────
// Findings
// ─────────────────────────────────────────────────────────────────

message ListFindingsRequest {
  string tenant_id = 1;
  string severity = 2;         // critical | high | medium | low | info
  string status = 3;           // new | confirmed | in_progress | resolved | ...
  string analysis_type = 4;    // sast | sca | ...
  string category = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListFindingsResponse {
  repeated Finding findings = 1;
  int32 total = 2;
}

// Finding is a flattened projection of domain.Finding. Location is
// rendered as a compact string (file:line or image:digest) for
// inter-service portability; callers that need the full polymorphic
// location fall back to the HTTP /api/v1/security/findings/{id}.
message Finding {
  string id = 1;
  string tenant_id = 2;
  string scan_id = 3;
  string fingerprint = 4;
  string title = 5;
  string description = 6;
  string severity = 7;
  string status = 8;
  string analysis_type = 9;
  string category = 10;
  string source_scanner = 11;
  string source_rule_id = 12;
  repeated string cves = 13;
  double normalized_score = 14;
  double cvss_score = 15;
  double epss_score = 16;
  string location_summary = 17;  // e.g. "src/foo.go:42" or "nginx:1.21"
  string remediation = 18;
  google.protobuf.Timestamp first_seen_at = 19;
  google.protobuf.Timestamp last_seen_at = 20;
}
