apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securitypolicies.vigil.sentiae.com
spec:
  group: vigil.sentiae.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                scanOnPush:
                  type: boolean
                  default: true
                scanOnPR:
                  type: boolean
                  default: true
                scanTypes:
                  type: array
                  items:
                    type: string
                    enum: [sast, sca, secret_detection, iac, container, full]
                  default: ["sast", "secret_detection"]
                blockOnCritical:
                  type: boolean
                  default: false
                  description: "Block deployments if critical findings exist"
                slaOverrides:
                  type: object
                  properties:
                    critical:
                      type: integer
                      description: "Hours for critical SLA"
                    high:
                      type: integer
                      description: "Hours for high SLA"
                excludedPaths:
                  type: array
                  items:
                    type: string
                  description: "File paths to exclude from scanning"
                namespaceSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
      additionalPrinterColumns:
        - name: ScanOnPush
          type: boolean
          jsonPath: .spec.scanOnPush
        - name: BlockCritical
          type: boolean
          jsonPath: .spec.blockOnCritical
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: securitypolicies
    singular: securitypolicy
    kind: SecurityPolicy
    shortNames:
      - sp
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: monitoringconfigs.vigil.sentiae.com
spec:
  group: vigil.sentiae.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                enabledProbes:
                  type: array
                  items:
                    type: string
                    enum: [execve, openat, connect, accept, setuid, setns, init_module]
                  default: ["execve", "openat", "connect"]
                ringBufferSizeKB:
                  type: integer
                  default: 256
                  minimum: 64
                  maximum: 4096
                collectProcessArgs:
                  type: boolean
                  default: true
                collectFileContent:
                  type: boolean
                  default: false
                ignoredPaths:
                  type: array
                  items:
                    type: string
                  default: ["/proc", "/sys", "/dev"]
                ignoredProcesses:
                  type: array
                  items:
                    type: string
                  default: ["containerd-shim", "runc"]
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      severity:
                        type: string
                        enum: [critical, high, medium, low]
                      condition:
                        type: string
                      enabled:
                        type: boolean
                        default: true
      additionalPrinterColumns:
        - name: Probes
          type: string
          jsonPath: .spec.enabledProbes
        - name: RingBuffer
          type: integer
          jsonPath: .spec.ringBufferSizeKB
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: monitoringconfigs
    singular: monitoringconfig
    kind: MonitoringConfig
    shortNames:
      - mc
