apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vigil-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vigil-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vigil-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: vigil-agent
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          command: ["/app/agent"]
          env:
            - name: VIGIL_CONTROL_PLANE_URL
              value: {{ .Values.agent.controlPlaneURL | quote }}
            - name: VIGIL_WAL_DIR
              value: {{ .Values.agent.walDir | quote }}
            - name: VIGIL_AUDIT_LISTEN_ADDR
              value: {{ .Values.agent.auditListenAddr | quote }}
            - name: VIGIL_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.bootstrapToken.existingSecret }}
                  key: {{ .Values.agent.bootstrapToken.key }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          securityContext:
            privileged: false
            capabilities:
              add: [BPF, PERFMON, SYS_PTRACE, NET_ADMIN]
              drop: [ALL]
          volumeMounts:
            - name: wal
              mountPath: /var/lib/vigil/wal
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
      volumes:
        - name: wal
          hostPath:
            path: /var/lib/vigil/wal
            type: DirectoryOrCreate
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
        - name: proc
          hostPath:
            path: /proc
        - name: btf
          hostPath:
            path: /sys/kernel/btf
{{- if .Values.operator.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vigil-operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vigil-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vigil-operator
    spec:
      serviceAccountName: vigil-operator
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          command: ["/app/operator"]
          args:
            - --leader-elect={{ .Values.operator.leaderElect }}
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
{{- end }}
