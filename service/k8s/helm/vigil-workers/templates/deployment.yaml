apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-workers
  labels:
    app.kubernetes.io/name: vigil-workers
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: scanner-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vigil-workers
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vigil-workers
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_SERVER_PORT
              value: "8080"
            - name: APP_SERVER_ENVIRONMENT
              value: "production"
            - name: APP_SERVER_LOG_LEVEL
              value: "info"
            - name: APP_DATABASE_HOST
              value: {{ .Values.database.host | quote }}
            - name: APP_DATABASE_PORT
              value: {{ .Values.database.port | quote }}
            - name: APP_DATABASE_NAME
              value: {{ .Values.database.name | quote }}
            - name: APP_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: username
            - name: APP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: password
            - name: APP_REDIS_ADDR
              value: {{ .Values.redis.addr | quote }}
            - name: APP_KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Workers don't serve HTTP — they process asynq tasks from Redis
          # No liveness/readiness probes needed (asynq handles its own health)
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-workers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-workers
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
